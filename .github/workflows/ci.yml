name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # Invariant firewall â€” BLOCKING. Fails if any CLAUDE.md critical invariant
      # stops matching the code (e.g. a doc says "legacy orchestrator takes over"
      # but the code throws). Kernels in server/scripts/invariants.spec.ts.
      - name: Invariant firewall (CLAUDE.md vs code)
        run: npm run check:invariants
      # Doc-reference validator â€” BLOCKING. Fails if any live routing doc
      # (architecture/conventions/decisions/CLAUDE.md/skills) references a file,
      # path, or line anchor that no longer exists.
      - name: Doc references resolve (live docs vs tree)
        run: npm run check:doc-refs
      # Registry manifest freshness â€” BLOCKING (P-005 pattern). Regenerate the
      # committed tools/routes/skills index; fail if a contributor changed a
      # registry without regenerating it.
      - name: Registry manifest fresh (docs/index/registries.generated.md)
        run: |
          npm run gen:registries
          git -C .. diff --exit-code docs/index/registries.generated.md \
            || { echo "::error::registries.generated.md is stale â€” run 'npm --prefix server run gen:registries' and commit."; exit 1; }
      # Symbol index freshness â€” WARN only. Line numbers drift on most edits, so
      # this is regenerated at /wave-commit, not hard-gated; surfaces drift
      # without blocking unrelated PRs.
      - name: Symbol index drift (warn)
        continue-on-error: true
        run: |
          npm run gen:symbols
          git -C .. diff --exit-code docs/index/symbols.generated.tsv \
            || echo "::warning::symbols.generated.tsv drifted â€” refresh with 'npm --prefix server run gen:symbols' at next wave."
      - run: npm test
      # Supply-chain gate â€” BLOCKING at high+. The dependency-hardening wave
      # (xlsxâ†’exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdbâ†’node-gypâ†’tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking Â· high+)
        run: npm audit --audit-level=high
      # Lint gate â€” report-only until the observability/lint wave clears the ~50 errors.
      - name: ESLint (report-only until lint wave)
        run: npm run lint
        continue-on-error: true

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      # Type gate â€” now BLOCKING (client type errors resolved to zero in the type-safety wave).
      - run: npm run typecheck
      - run: npm run theme:check
      - run: npm test
      # Supply-chain gate â€” BLOCKING at high+. The dependency-hardening wave
      # (xlsxâ†’exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdbâ†’node-gypâ†’tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking Â· high+)
        run: npm audit --audit-level=high
      # Lint gate â€” now BLOCKING. All ESLint ERRORS cleared (auto-fixes +
      # mechanical fixes); 22 react-hooks/rules-of-hooks remain WARNINGS pending
      # per-component QA (see client/eslint.config.js). Warnings don't fail the
      # gate; a new error will.
      - name: ESLint (blocking)
        run: npm run lint

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python-service/requirements.txt
      - run: pip install -r requirements.txt
      - name: Smoke import
        run: python -c "import main; print('OK')"
      # ruff is now BLOCKING (all 1175 findings cleared â€” Wave R32). mypy stays
      # report-only: it surfaces ~52 type findings, a tracked typing-adoption
      # effort across the heavily dynamic pandas/sklearn service; flip its
      # `continue-on-error` off once those are annotated. Config in
      # python-service/pyproject.toml.
      - name: Install python lint tools
        run: pip install ruff mypy
      - name: ruff (blocking)
        run: ruff check .
      - name: mypy (report-only until typing-adoption wave)
        run: mypy .
        continue-on-error: true
      - name: Requirements sync gate (P-005)
        run: |
          set -euo pipefail
          wrapper="../api/data-ops/requirements.txt"
          # Vercel wrapper must -r the python-service requirements file. If a
          # contributor hard-codes versions again, this gate fails loudly.
          if ! grep -qE '^-r[[:space:]]+\.\./\.\./python-service/requirements\.txt$' "$wrapper"; then
            echo "api/data-ops/requirements.txt must -r ../../python-service/requirements.txt"
            exit 1
          fi
