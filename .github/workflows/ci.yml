name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      # CICD-10 · Typecheck the Vercel serverless wrapper(s). api/index.ts wraps
      # server/createApp but is never built by the server's own tsconfig, so a
      # broken cross-service import would only surface at deploy. Runs from repo
      # root (working-directory: .) using the server's tsc; resolves the
      # `../server/index.js` import to the .ts source via api/tsconfig.json.
      # BLOCKING — the wrapper currently typechecks clean.
      - name: Typecheck Vercel api/ wrappers
        working-directory: .
        run: ./server/node_modules/.bin/tsc --noEmit -p api/tsconfig.json
      # EX5 / TYPE-3 · Type-check the TEST tree (the main tsconfig excludes it).
      # Test files import production source and drift out of type-sync silently;
      # this surfaces the drift. Report-only for now (~116 pre-existing test type
      # errors); flip continue-on-error off once the test type-debt is burned down.
      - name: Typecheck tests (report-only until test type-debt cleared)
        run: npx tsc --noEmit -p tsconfig.test.json
        continue-on-error: true
      # Invariant firewall — BLOCKING. Fails if any CLAUDE.md critical invariant
      # stops matching the code (e.g. a doc says "legacy orchestrator takes over"
      # but the code throws). Kernels in server/scripts/invariants.spec.ts.
      - name: Invariant firewall (CLAUDE.md vs code)
        run: npm run check:invariants
      # EX16 / TYPE-4 · Type-escape ratchet — BLOCKING. Fails if `as any` /
      # `as unknown as` count grows past the committed baseline, so the any-bleed
      # can only shrink. Lower the BASELINE in scripts/check-type-escapes.ts as
      # casts are removed.
      - name: Type-escape ratchet (no new as-any / as-unknown-as)
        run: npm run check:type-escapes
      # Doc-reference validator — BLOCKING. Fails if any live routing doc
      # (architecture/conventions/decisions/CLAUDE.md/skills) references a file,
      # path, or line anchor that no longer exists.
      - name: Doc references resolve (live docs vs tree)
        run: npm run check:doc-refs
      # Registry manifest freshness — BLOCKING (P-005 pattern). Regenerate the
      # committed tools/routes/skills index; fail if a contributor changed a
      # registry without regenerating it.
      - name: Registry manifest fresh (docs/index/registries.generated.md)
        run: |
          npm run gen:registries
          git -C .. diff --exit-code docs/index/registries.generated.md \
            || { echo "::error::registries.generated.md is stale — run 'npm --prefix server run gen:registries' and commit."; exit 1; }
      # Symbol index freshness — WARN only. Line numbers drift on most edits, so
      # this is regenerated at /wave-commit, not hard-gated; surfaces drift
      # without blocking unrelated PRs.
      - name: Symbol index drift (warn)
        continue-on-error: true
        run: |
          npm run gen:symbols
          git -C .. diff --exit-code docs/index/symbols.generated.tsv \
            || echo "::warning::symbols.generated.tsv drifted — refresh with 'npm --prefix server run gen:symbols' at next wave."
      - run: npm test
      # Supply-chain gate — BLOCKING at high+. The dependency-hardening wave
      # (xlsx→exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdb→node-gyp→tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking · high+)
        run: npm audit --audit-level=high
      # CICD-5 · Lint gate — now BLOCKING. All ESLint ERRORS cleared (the two
      # remaining — a constant-truthiness `||` and a `let`-never-reassigned —
      # were fixed behaviour-preservingly). ~3.1k findings remain as WARNINGS
      # (no-explicit-any, no-unused-vars, the size/complexity ratchet on the
      # god-files), tracked for incremental burn-down in server/eslint.config.js.
      # `npm run lint` is `eslint .` with no `--max-warnings`, so warnings don't
      # fail the gate; a new ERROR will.
      - name: ESLint (blocking)
        run: npm run lint
      # CICD-4 · Prettier format check — REPORT-ONLY (no mass reformat yet; the
      # --write pass is a separate churn-heavy wave). Surfaces formatting drift
      # without blocking.
      - name: Prettier format check (report-only)
        run: npm run format:check
        continue-on-error: true
      # CICD-6 · Test coverage — REPORT-ONLY (Node 20 built-in, no threshold).
      # COVERAGE=1 adds --experimental-test-coverage; the normal `npm test`
      # above is unchanged.
      - name: Test coverage (report-only)
        run: npm run coverage
        continue-on-error: true

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      # Type gate — now BLOCKING (client type errors resolved to zero in the type-safety wave).
      - run: npm run typecheck
      - run: npm run theme:check
      - run: npm test
      # Supply-chain gate — BLOCKING at high+. The dependency-hardening wave
      # (xlsx→exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdb→node-gyp→tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking · high+)
        run: npm audit --audit-level=high
      # Lint gate — now BLOCKING. All ESLint ERRORS cleared (auto-fixes +
      # mechanical fixes); 22 react-hooks/rules-of-hooks remain WARNINGS pending
      # per-component QA (see client/eslint.config.js). Warnings don't fail the
      # gate; a new error will.
      - name: ESLint (blocking)
        run: npm run lint
      # CICD-4 · Prettier format check — REPORT-ONLY (no mass reformat yet; the
      # --write pass is a separate churn-heavy wave). Surfaces formatting drift
      # without blocking.
      - name: Prettier format check (report-only)
        run: npm run format:check
        continue-on-error: true
      # CICD-6 · Test coverage — REPORT-ONLY (@vitest/coverage-v8, no threshold).
      - name: Test coverage (report-only)
        run: npm run coverage
        continue-on-error: true

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python-service/requirements.txt
      - run: pip install -r requirements.txt
      - name: Smoke import
        run: python -c "import main; print('OK')"
      # EX5 / TEST-4 · Run the Python unit tests (MMM fit/optimize/transforms).
      # Previously CI only smoke-imported main.py, so ~all real Python behaviour
      # was unverified in CI despite passing locally. Now blocking.
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      # ruff is now BLOCKING (all 1175 findings cleared — Wave R32). mypy stays
      # report-only: it surfaces ~52 type findings, a tracked typing-adoption
      # effort across the heavily dynamic pandas/sklearn service; flip its
      # `continue-on-error` off once those are annotated. Config in
      # python-service/pyproject.toml.
      - name: Install python lint tools
        run: pip install ruff mypy
      - name: ruff (blocking)
        run: ruff check .
      - name: mypy (report-only until typing-adoption wave)
        run: mypy .
        continue-on-error: true
      - name: Requirements sync gate (P-005)
        run: |
          set -euo pipefail
          wrapper="../api/data-ops/requirements.txt"
          # Vercel wrapper must -r the python-service requirements file. If a
          # contributor hard-codes versions again, this gate fails loudly.
          if ! grep -qE '^-r[[:space:]]+\.\./\.\./python-service/requirements\.txt$' "$wrapper"; then
            echo "api/data-ops/requirements.txt must -r ../../python-service/requirements.txt"
            exit 1
          fi
