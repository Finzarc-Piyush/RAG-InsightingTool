name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run theme:check

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python-service/requirements.txt
      - run: pip install -r requirements.txt
      - name: Smoke import
        run: python -c "import main; print('OK')"
      - name: Requirements sync gate (P-005)
        run: |
          set -euo pipefail
          wrapper="../api/data-ops/requirements.txt"
          # Vercel wrapper must -r the python-service requirements file. If a
          # contributor hard-codes versions again, this gate fails loudly.
          if ! grep -qE '^-r[[:space:]]+\.\./\.\./python-service/requirements\.txt$' "$wrapper"; then
            echo "api/data-ops/requirements.txt must -r ../../python-service/requirements.txt"
            exit 1
          fi
