name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      # Supply-chain gate — BLOCKING at high+. The dependency-hardening wave
      # (xlsx→exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdb→node-gyp→tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking · high+)
        run: npm audit --audit-level=high
      # Lint gate — report-only until the observability/lint wave clears the ~50 errors.
      - name: ESLint (report-only until lint wave)
        run: npm run lint
        continue-on-error: true

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      # Type gate — now BLOCKING (client type errors resolved to zero in the type-safety wave).
      - run: npm run typecheck
      - run: npm run theme:check
      - run: npm test
      # Supply-chain gate — BLOCKING at high+. The dependency-hardening wave
      # (xlsx→exceljs, dead jspdf removed, vitest bump, server `tar` override
      # clearing the duckdb→node-gyp→tar chain) brought both packages to
      # 0 high / 0 critical. Residual advisories are dev-only/transitive
      # MODERATES, tolerated below this threshold.
      - name: npm audit (blocking · high+)
        run: npm audit --audit-level=high
      # Lint gate — now BLOCKING. All ESLint ERRORS cleared (auto-fixes +
      # mechanical fixes); 22 react-hooks/rules-of-hooks remain WARNINGS pending
      # per-component QA (see client/eslint.config.js). Warnings don't fail the
      # gate; a new error will.
      - name: ESLint (blocking)
        run: npm run lint

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python-service/requirements.txt
      - run: pip install -r requirements.txt
      - name: Smoke import
        run: python -c "import main; print('OK')"
      # Wave R25 · ruff + mypy gates. Report-only until the python-lint wave
      # clears findings (mirrors the server eslint report-only pattern); flip
      # `continue-on-error` off per tool once each is clean. Config in
      # python-service/pyproject.toml.
      - name: Install python lint tools
        run: pip install ruff mypy
      - name: ruff (report-only until python-lint wave)
        run: ruff check .
        continue-on-error: true
      - name: mypy (report-only until python-lint wave)
        run: mypy .
        continue-on-error: true
      - name: Requirements sync gate (P-005)
        run: |
          set -euo pipefail
          wrapper="../api/data-ops/requirements.txt"
          # Vercel wrapper must -r the python-service requirements file. If a
          # contributor hard-codes versions again, this gate fails loudly.
          if ! grep -qE '^-r[[:space:]]+\.\./\.\./python-service/requirements\.txt$' "$wrapper"; then
            echo "api/data-ops/requirements.txt must -r ../../python-service/requirements.txt"
            exit 1
          fi
